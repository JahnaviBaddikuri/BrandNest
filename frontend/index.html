<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrandNest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav">
      <div class="nav__logo"><img src="nature_14835036.png" alt="BrandNest Logo">BrandNest</div>
      <nav class="nav__links"></nav>
      <div class="nav__actions">
        <a href="login.html" class="btn btn--ghost">Login</a>
        <a href="join-brand.html" class="btn">Join as Brand</a>
        <a href="join-creator.html" class="btn btn--dark">Join as Creator</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" id="marketplace">
      <div class="hero__content">
        <h1>Create Together. Grow Together.</h1>
        <p>Find and hire top Instagram, TikTok, YouTube, and UGC influencers to create unique content for your brand.</p>
        <div class="search">
          <div class="search__item">
            <label>Platform</label>
            <select id="platformSelect">
              <option>Choose a platform</option>
              <option>Instagram</option>
              <option>TikTok</option>
              <option>YouTube</option>
              <option>UGC</option>
            </select>
          </div>
          <div class="search__item">
            <label>Category</label>
            <select id="categorySelect">
              <option>Choose a category</option>
              <option>Fashion</option>
              <option>Beauty</option>
              <option>Fitness</option>
              <option>Tech</option>
            </select>
          </div>
          <button class="btn btn--search" id="searchBtn"><img src="image.png" alt="Search"></button>
        </div>
        
        
        <div class="hero__results">
          <div class="section__header">
            <div>
              <p class="section__eyebrow">Featured</p>
              <h2>Hire top influencers across all platforms</h2>
            </div>
          </div>
          <div class="card-grid" id="featuredGrid"></div>
        </div>
      </div>
    </section>

    <!-- Brands Section -->
    <section class="brands-section">
      <div class="brands__content">
        <div class="section__header">
          <div>
            <p class="section__eyebrow">Brands</p> 
            <h2>Top Brands Looking for Creators</h2>
          </div>
        </div>
        <div class="card-grid" id="brandsGrid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer__brand">BrandNest</div>
    <div class="footer__links">
      
    </div>
    <p class="footer__copy"></p>
  </footer>

  <script src="auth.js"></script>
  <script>
    // Expose session helpers for app.js (must be before app.js loads)
    function getSession() { return getUserSession(); }
    function clearSession() { clearUserSession(); }
  </script>
  <script src="app.js"></script>
  <script>
    // Update nav if user is logged in
    (function() {
      if (isUserLoggedIn()) {
        const user = getUserSession();
        const actionsDiv = document.querySelector('.nav__actions');
        if (actionsDiv && user) {
          const name = user.username || user.company_name || 'User';
          const initial = name.charAt(0).toUpperCase();
          actionsDiv.innerHTML = `
            <a href="dashboard.html" class="user-avatar" title="${name}">${initial}</a>
          `;
        }
      }
    })();
  </script>
</body>
</html>
